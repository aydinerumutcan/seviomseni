<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seviyorum sayacı</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e6fffa; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            position: relative;
        }

        
        #counter-container {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d3436; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 100; 
            transition: opacity 0.5s;
        }

        #count {
            color: #00b894; 
        }

        
        #button-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; 
            z-index: 10;
            transition: opacity 0.5s;
        }

        
        #love-button {
            font-size: 2rem;
            padding: 20px 50px;
            cursor: pointer;
            background-color: #00b894;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0, 184, 148, 0.3);
            transition: transform 0.1s, background-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        #love-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px rgba(0, 184, 148, 0.2);
        }

        #love-button:hover {
            background-color: #00947a;
        }

        
        #finish-button {
            font-size: 1.2rem;
            padding: 10px 30px;
            cursor: pointer;
            background-color: transparent;
            color: #00947a;
            border: 2px solid #00b894;
            border-radius: 30px;
            transition: all 0.3s ease;
            outline: none;
        }

        #finish-button:hover {
            background-color: #00b894;
            color: white;
        }

        
        #result-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e6fffa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.5s ease-in-out;
            z-index: 200;
        }

        #result-screen h1 {
            font-size: 4rem;
            color: #00b894;
            margin: 0 0 10px 0;
        }

        #result-screen p {
            font-size: 1.5rem;
            color: #2d3436;
            margin: 0;
            font-weight: bold;
        }

        
        .heart-particle {
            position: absolute;
            color: #55efc4;
            font-size: 1.5rem;
            pointer-events: none; 
            animation: flyUp 1.5s linear forwards;
            opacity: 0;
            z-index: 5;
        }

        @keyframes flyUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-150px) translateX(var(--random-x)) rotate(var(--random-deg));
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="counter-container">
        seni <span id="count">0</span> kere sevmek ben
    </div>

    <div id="button-wrapper">
        <button id="love-button">bas bakim</button>
        <button id="finish-button">tmm bu kadar yeter beni geçemez</button>
    </div>

    <div id="result-screen">
        <h1 id="final-score">0</h1>
        <p>bu rakamların önemi yok birkaç tık ile sevgimiz ölçülemezzz, kaç tane tıkladığını şey yapmak istersen nerdeyim biliyosun güzelim benim</p>
    </div>

    <script>
        let count = 0;
        const loveButton = document.getElementById('love-button');
        const finishButton = document.getElementById('finish-button');
        const countDisplay = document.getElementById('count');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const buttonWrapper = document.getElementById('button-wrapper');
        const counterContainer = document.getElementById('counter-container');

        
        loveButton.addEventListener('click', (e) => {
            count++;
            countDisplay.textContent = count;
            createHearts(e.clientX, e.clientY);
        });

        
        finishButton.addEventListener('click', () => {
            
            finalScoreDisplay.textContent = count + " kere sevmek seni";
            
            
            buttonWrapper.style.opacity = '0';
            counterContainer.style.opacity = '0';
            
            setTimeout(() => {
                resultScreen.style.opacity = '1';
                resultScreen.style.pointerEvents = 'auto';
            }, 300); 
        });

        
        function createHearts(x, y) {
            for (let i = 0; i < 5; i++) {
                const heart = document.createElement('span');
                heart.classList.add('heart-particle');
                heart.textContent = '💚';

                heart.style.left = (x - 15) + 'px'; 
                heart.style.top = (y - 15) + 'px';

                const randomX = (Math.random() - 0.5) * 100 + 'px'; 
                const randomDeg = (Math.random() - 0.5) * 90 + 'deg'; 
                heart.style.setProperty('--random-x', randomX);
                heart.style.setProperty('--random-deg', randomDeg);

                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 1500);
            }
        }
    </script>
</body>
</html>
